/* ── CLAUDE API ── */
async function ask(prompt, max=1200){
  try{
    // Calls our own Vercel proxy — API key is safe on the server
    const r = await fetch("/api/suggest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, max_tokens: max })
    });
    if(!r.ok){
      const err = await r.json().catch(()=>({}));
      throw new Error(err?.error?.message || `Error ${r.status}`);
    }
    const d = await r.json();
    return d.content?.[0]?.text || "";
  } catch(e){
    console.error("API error:", e);
    throw e;
  }
}
function pj(t){
  try{return JSON.parse(t.replace(/```json|```/g,"").trim());}
  catch{const m=t.match(/[\[{][\s\S]*[\]}]/);if(m){try{return JSON.parse(m[0]);}catch{}}return null;}
}

function Sugg({person,occ,setPage,setMF}){
  const [sugs,setSugs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [curOcc,setCurOcc]=useState(occ||{type:"Birthday",budget:"₹1,500–₹3,000"});
  const [glows,setGlows]=useState({});
  const [saved,setSaved]=useState({});
  const [chatMsg,setChatMsg]=useState("");
  const [chatLog,setChatLog]=useState([]);
  const [chatLoading,setChatLoading]=useState(false);
  const [showChat,setShowChat]=useState(false);
  const chatEnd=useRef();

  const catCols={Experience:"#dbeafe,#1d4ed8",Product:"#d1fae5,#065f46",Subscription:"#ede9fe,#5b21b6",Traditional:"#ffedd5,#c2410c",Festive:"#fce7f3,#9d174d"};

  const fetch_=useCallback(async(extra="")=>{
    if(!person)return;
    setLoading(true);setSugs([]);
    const prompt=`You are Echo, an Indian gift AI. Generate 4 personalized gift suggestions.
Recipient: ${person.name} (${person.rel})
Interests: ${person.int}
Anti-wishlist: ${person.anti||"none"}
Recent events: ${person.ev||"none"}
Occasion: ${curOcc.type}
Budget: ${curOcc.budget} (Indian Rupees ₹)
${extra?"Extra: "+extra:""}
Use Indian brands (Vahdam, Forest Essentials, Blue Tokai, Fabindia, Thrillophilia etc). All prices in ₹.
Return ONLY JSON array of 4: [{title,description,reasoning,priceRange,category,brand}]. No markdown.`;
    try{
      const t=await ask(prompt);
      const d=pj(t);
      if(Array.isArray(d))setSugs(d);
      else setSugs([{title:"Could not load",description:"Please try refreshing.",reasoning:"",priceRange:"",category:"Product",brand:""}]);
    }catch{setSugs([{title:"Error",description:"Try again.",reasoning:"",priceRange:"",category:"Product",brand:""}]);}
    setLoading(false);
  },[person,curOcc]);

  useEffect(()=>{
    if(person){
      fetch_();
      setChatLog([{r:"bot",t:"Namaste! 🙏 I'm Gift Scout. Try \"under ₹1000\", \"something traditional\", or \"for Diwali\"."}]);
    }
  },[person?.id,curOcc.type]);

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:"smooth"});},[chatLog]);

  const sendChat=async()=>{
    if(!chatMsg.trim()||chatLoading)return;
    const msg=chatMsg.trim();setChatMsg("");
    setChatLog(h=>[...h,{r:"user",t:msg}]);setChatLoading(true);
    const prompt=`Indian gifts for ${person?.name} (${person?.int}), budget ${curOcc.budget}, occasion ${curOcc.type}. Request: "${msg}". 1 sentence reply, then JSON array of 4 Indian gifts [{title,description,reasoning,priceRange,category,brand}]. No markdown.`;
    try{
      const txt=await ask(prompt);
      const m=txt.match(/\[[\s\S]*\]/);
      if(m)setSugs(pj(m[0])||sugs);
      setChatLog(h=>[...h,{r:"bot",t:txt.split("[")[0].trim()||"Here are refined suggestions!"}]);
    }catch{setChatLog(h=>[...h,{r:"bot",t:"Sorry, try again!"}]);}
    setChatLoading(false);
  };

  if(!person)return(
    <div style={{padding:"24px 28px"}}>
      <Card ch={<div style={{textAlign:"center",padding:48}}>
        <p style={{fontSize:52,marginBottom:12}}>🎁</p>
        <h2 style={{fontSize:20,fontWeight:800,marginBottom:8}}>Select a person first</h2>
        <p style={{color:C.gray,marginBottom:20}}>Go to Your People and click Gift Ideas</p>
        <Btn ch="Go to Your People →" onClick={()=>setPage("people")}/>
      </div>}/>
    </div>
  );

  return(
    <div style={{padding:"24px 28px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,flexWrap:"wrap"}}>
        <Ava e={person.emoji} size={50}/>
        <div style={{flex:1}}>
          <h1 style={{fontSize:22,fontWeight:900,color:C.dark}}>{person.name}'s Gift Ideas</h1>
          <p style={{fontSize:13,color:C.gray,marginTop:2}}>{person.rel} · {curOcc.type} · {curOcc.budget}</p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <select value={curOcc.type} onChange={e=>setCurOcc(o=>({...o,type:e.target.value}))}
            style={{padding:"9px 14px",borderRadius:10,border:"1.5px solid "+C.border,fontSize:13,outline:"none",color:C.text,background:"#fff",cursor:"pointer"}}>
            {OCC.map(o=><option key={o}>{o}</option>)}
          </select>
          <select value={curOcc.budget} onChange={e=>setCurOcc(o=>({...o,budget:e.target.value}))}
            style={{padding:"9px 14px",borderRadius:10,border:"1.5px solid "+C.border,fontSize:13,outline:"none",color:C.text,background:"#fff",cursor:"pointer"}}>
            {BUD.map(b=><option key={b}>{b}</option>)}
          </select>
          <Btn ch="🔄 Refresh" sm onClick={()=>fetch_()}/>
          <Btn ch="🙏 Scout" sm type={showChat?"o":"g"} onClick={()=>setShowChat(s=>!s)}/>
        </div>
      </div>

      {/* Chat */}
      {showChat&&(
        <Card style={{marginBottom:20}} ch={<>
          <p style={{fontSize:14,fontWeight:700,marginBottom:12}}>🙏 Gift Scout — Chat to refine</p>
          <div style={{maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
            {chatLog.map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:m.r==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"75%",padding:"9px 14px",borderRadius:14,fontSize:13,
                  background:m.r==="user"?grad:"#f3f4f6",color:m.r==="user"?"#fff":C.text}}>{m.t}</div>
              </div>
            ))}
            {chatLoading&&<div style={{display:"flex",gap:6,alignItems:"center",fontSize:13,color:C.gray}}>
              <div style={{width:14,height:14,border:"2px solid "+C.o,borderTopColor:"transparent",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
              Echo thinking…
            </div>}
            <div ref={chatEnd}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Inp val={chatMsg} onChange={e=>setChatMsg(e.target.value)} ph="e.g. under ₹1000, traditional, for Diwali…"/>
            <Btn ch="Send" onClick={sendChat} disabled={chatLoading}/>
          </div>
        </>}/>
      )}

      {/* Suggestions */}
      {loading?<Loading text={`Finding perfect gifts for ${person.name}…`}/>:(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          {sugs.map((sg,i)=>{
            const [bg,tc]=(catCols[sg.category]||"#f3f4f6,#374151").split(",");
            return(
              <div key={i} style={{background:"#fff",borderRadius:16,border:"1px solid "+C.border,padding:22}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:8}}>
                  <div style={{flex:1}}>
                    <h3 style={{fontSize:16,fontWeight:800,color:C.dark,marginBottom:3}}>{sg.title}</h3>
                    {sg.brand&&<p style={{fontSize:12,color:"#9ca3af"}}>by {sg.brand}</p>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <p style={{fontSize:17,fontWeight:900,color:C.o}}>{sg.priceRange}</p>
                    <button onClick={()=>setSaved(sv=>({...sv,[i]:!sv[i]}))} style={{fontSize:20,background:"none",border:"none",cursor:"pointer"}}>{saved[i]?"❤️":"🤍"}</button>
                  </div>
                </div>
                <p style={{fontSize:13,color:C.text,lineHeight:1.6,marginBottom:10}}>{sg.description}</p>
                {sg.category&&<span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:bg,color:tc,display:"inline-block",marginBottom:10}}>{sg.category}</span>}
                {sg.reasoning&&(
                  <div style={{background:"linear-gradient(135deg,#fff9f6,#fdf4ff)",border:"1px solid rgba(255,107,53,.15)",borderRadius:12,padding:12,marginBottom:12}}>
                    <p style={{fontSize:11,fontWeight:700,color:C.o,marginBottom:4}}>🧠 Echo's Reasoning</p>
                    <p style={{fontSize:13,color:C.text,lineHeight:1.6}}>{sg.reasoning}</p>
                  </div>
                )}
                <div style={{marginBottom:12}}>
                  <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",marginBottom:6,textTransform:"uppercase"}}>Gift Glow</p>
                  <div style={{display:"flex",gap:4}}>
                    {[1,2,3,4,5].map(n=>(
                      <button key={n} onClick={()=>setGlows(g=>({...g,[i]:n}))}
                        style={{fontSize:20,color:(glows[i]||0)>=n?"#f59e0b":"#e5e7eb",background:"none",border:"none",cursor:"pointer",padding:0}}>★</button>
                    ))}
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn ch="Browse Shop" type="g" sm style={{flex:1}} onClick={()=>{setMF(sg.category);setPage("market");}}/>
                  <Btn ch="🛍️ Buy Now" sm style={{flex:1}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Quiz({people,setPeople,setPage,setAP,setAO}){
  const [phase,setPhase]=useState("setup");
  const [setup,setSetup]=useState({name:"",rel:"Friend",occ:"Birthday",bud:"₹1,500–₹3,000"});
  const [cur,setCur]=useState(0);
  const [ans,setAns]=useState([]);
  const [chosen,setChosen]=useState(null);
  const [persona,setPersona]=useState(null);
  const [loading,setLoading]=useState(false);
  const [copied,setCopied]=useState(false);
  const link=`echogifts.in/quiz/${setup.name?setup.name.toLowerCase().replace(/\s+/g,"-")+"-":""}${Math.random().toString(36).slice(2,6)}`;

  const choose=(side)=>{
    if(chosen)return;
    setChosen(side);
    setTimeout(()=>{
      const q=QS[cur];
      const na=[...ans,{q:q.id,side,tag:q[side].t}];
      setAns(na);setChosen(null);
      if(cur+1<QS.length)setCur(c=>c+1);
      else build(na);
    },380);
  };

  const build=async(a)=>{
    setPhase("result");setLoading(true);
    const sum=a.map(x=>{const q=QS.find(q=>q.id===x.q);return`${q?.l}: ${q?.[x.side]?.l}`;}).join(", ");
    const p=`Based on these quiz answers from an Indian person: ${sum}
Return ONLY JSON (no markdown): {"headline":"fun 6-8 word title","interests":"2-3 sentences with Indian context","personality":["t1","t2","t3","t4"],"giftStyle":"ideal gifts sentence","antiWishlist":"what to avoid","topCategories":["c1","c2","c3"]}`;
    try{
      const t=await ask(p,600);
      setPersona(pj(t));
    }catch{
      setPersona({headline:"A Wonderfully Vibrant Indian Soul",interests:"A warm, curious person who loves Indian culture and modern experiences.",personality:["Warm","Curious","Festive","Creative"],giftStyle:"Thoughtful Indian products and memorable experiences.",antiWishlist:"Generic gifts",topCategories:["Food & Drink","Experience","Traditional"]});
    }
    setLoading(false);
  };

  const saveP=()=>{
    if(!persona)return;
    const p={id:Date.now(),name:setup.name||"Friend",rel:setup.rel,emoji:"🙂",int:persona.interests,anti:persona.antiWishlist||"",ev:"",v:72,lg:"None yet",da:0,gh:[],fromQuiz:true};
    const nx=[...people,p];setPeople(nx);ls.set("echo_people",nx);
    setAP(p);setAO({type:setup.occ,budget:setup.bud});
    setPage("sugg");
  };

  const reset=()=>{setPhase("setup");setCur(0);setAns([]);setChosen(null);setPersona(null);};

  if(phase==="setup")return(
    <div style={{padding:"24px 28px"}}>
      <h1 style={{fontSize:22,fontWeight:900,color:C.dark,marginBottom:4}}>🎯 This or That Quiz</h1>
      <p style={{fontSize:13,color:C.gray,marginBottom:24}}>Send an anonymous quiz — they pick preferences, Echo builds their gift persona secretly.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <Card ch={<>
          <p style={{fontWeight:800,fontSize:15,marginBottom:16}}>⚙️ Customize</p>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div><p style={{fontSize:12,fontWeight:700,color:C.gray,marginBottom:6}}>THEIR NAME (optional)</p><Inp val={setup.name} onChange={e=>setSetup(s=>({...s,name:e.target.value}))} ph="e.g. Priya"/></div>
            <div>
              <p style={{fontSize:12,fontWeight:700,color:C.gray,marginBottom:8}}>RELATIONSHIP</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{REL.slice(0,6).map(r=><Pill key={r} ch={r} on={setup.rel===r} onClick={()=>setSetup(s=>({...s,rel:r}))}/>)}</div>
            </div>
            <div>

/* ── TIMELINE ── */
function Timeline({people,onUpdate,activePerson}){
  const [selId,setSelId]=useState(activePerson?.id||people[0]?.id);
  const [showAdd,setShowAdd]=useState(false);
  const [f,setF]=useState({gift:"",glow:5,note:""});
  const p=people.find(x=>x.id===selId)||people[0];
  const hist=p?.gh||[];
  const avg=hist.length?(hist.reduce((a,g)=>a+g.gl,0)/hist.length).toFixed(1):"-";

  const add=()=>{
    if(!f.gift.trim()||!p)return;
    const entry={id:Date.now(),g:f.gift,dt:new Date().toISOString().slice(0,10),gl:f.glow,n:f.note};
    onUpdate({...p,gh:[entry,...hist],lg:f.gift,da:0});
    setF({gift:"",glow:5,note:""});setShowAdd(false);
  };

  return(
    <div style={{padding:"24px 28px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:900,color:C.dark}}>📋 Gift Timeline</h1>
          <p style={{fontSize:13,color:C.gray,marginTop:4}}>Your complete gifting history</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <select value={selId} onChange={e=>setSelId(Number(e.target.value))}
            style={{padding:"9px 14px",borderRadius:10,border:"1.5px solid "+C.border,fontSize:13,outline:"none",color:C.text,background:"#fff"}}>
            {people.map(x=><option key={x.id} value={x.id}>{x.name}</option>)}
          </select>
          <Btn ch="+ Log Gift" onClick={()=>setShowAdd(true)}/>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:20}}>
        {[{v:hist.length,l:"Total gifts",i:"🎁"},{v:avg,l:"Avg Glow",i:"⭐"},{v:p?.lg||"None",l:"Last gift",i:"🕐"},{v:p?.da?`${p.da}d ago`:"Today",l:"Last gesture",i:"📅"}].map((st,i)=>(
          <Card key={i} ch={<>
            <div style={{fontSize:20,marginBottom:6}}>{st.i}</div>
            <div style={{fontSize:22,fontWeight:900}}>{st.v}</div>
            <div style={{fontSize:13,color:C.gray,marginTop:2}}>{st.l}</div>
          </>}/>
        ))}
      </div>

      {showAdd&&(
        <Card style={{marginBottom:20,border:`1.5px solid ${C.o}`}} ch={<>
          <p style={{fontSize:15,fontWeight:800,marginBottom:14}}>Log a gift for {p?.name}</p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><p style={{fontSize:12,fontWeight:700,color:C.gray,marginBottom:6}}>GIFT NAME *</p><Inp val={f.gift} onChange={e=>setF(x=>({...x,gift:e.target.value}))} ph="e.g. Vahdam Tea Set, Himalayan Trek…" af/></div>
            <div><p style={{fontSize:12,fontWeight:700,color:C.gray,marginBottom:6}}>NOTES (optional)</p><Inp val={f.note} onChange={e=>setF(x=>({...x,note:e.target.value}))} ph="How did they react?"/></div>
            <div>
              <p style={{fontSize:12,fontWeight:700,color:C.gray,marginBottom:8}}>GIFT GLOW SCORE</p>
              <div style={{display:"flex",gap:8}}>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>setF(x=>({...x,glow:n}))}
                    style={{fontSize:26,background:"none",border:"none",cursor:"pointer",color:f.glow>=n?"#f59e0b":"#e5e7eb"}}>
                    {f.glow>=n?"★":"☆"}
                  </button>
                ))}
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <Btn ch="Cancel" type="g" onClick={()=>setShowAdd(false)}/>
              <Btn ch="Save to Timeline" disabled={!f.gift.trim()} onClick={add}/>
            </div>
          </div>
        </>}/>
      )}

      {hist.length===0?(
        <Card ch={<div style={{textAlign:"center",padding:48}}>
          <p style={{fontSize:40,marginBottom:12}}>🎁</p>
          <h3 style={{fontSize:16,fontWeight:800,marginBottom:8}}>No gifts logged yet for {p?.name}</h3>
          <p style={{color:C.gray,marginBottom:20,fontSize:14}}>Logging gifts helps Echo make better suggestions</p>
          <Btn ch="+ Log First Gift" onClick={()=>setShowAdd(true)}/>
        </div>}/>
      ):(
        <div style={{position:"relative",paddingLeft:28}}>
          <div style={{position:"absolute",left:20,top:0,bottom:0,width:2,background:C.border}}/>
          {hist.map(h=>(
            <div key={h.id} style={{display:"flex",gap:16,marginBottom:20,position:"relative"}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:grad,border:"3px solid #fff",boxShadow:"0 2px 8px rgba(255,107,53,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,position:"absolute",left:-28,zIndex:1}}>🎁</div>
              <Card style={{flex:1,padding:16}} ch={<>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                  <h4 style={{fontSize:15,fontWeight:800}}>{h.g}</h4>
                  <span style={{fontSize:12,color:"#9ca3af",flexShrink:0}}>{h.dt}</span>
                </div>
                <div style={{display:"flex",gap:2,marginBottom:h.n?8:0}}>
                  {[1,2,3,4,5].map(n=><span key={n} style={{fontSize:16,color:h.gl>=n?"#f59e0b":"#e5e7eb"}}>★</span>)}
                  <span style={{fontSize:12,color:"#9ca3af",marginLeft:4}}>{h.gl}/5 Glow</span>
                </div>
                {h.n&&<p style={{fontSize:13,color:C.gray,fontStyle:"italic"}}>"{h.n}"</p>}
              </>}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── SETTINGS ── */
function Settings({user,setUser,onLogout,onGoogle,gLoading}){
  const [name,setName]=useState(user?.name||"");
  const [saved,setSaved]=useState(false);
  const save=()=>{const u={...user,name};setUser(u);ls.set("echo_user",u);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return(
    <div style={{padding:"24px 28px"}}>
      <h1 style={{fontSize:22,fontWeight:900,color:C.dark,marginBottom:24}}>⚙️ Settings</h1>
      <div style={{maxWidth:580}}>

        {user?.isGuest&&(
          <div style={{background:"linear-gradient(135deg,#fff9f6,#fdf4ff)",border:"2px solid rgba(255,107,53,.2)",borderRadius:20,padding:24,marginBottom:20,textAlign:"center"}}>
            <p style={{fontSize:40,marginBottom:10}}>💾</p>
            <h3 style={{fontSize:18,fontWeight:800,marginBottom:6}}>Save your data permanently</h3>
            <p style={{fontSize:14,color:C.gray,marginBottom:20}}>You're on a guest session. Your people & history are saved in this browser only. Sign in with Google to sync across all devices.</p>
            <button onClick={onGoogle} disabled={gLoading}
              style={{display:"inline-flex",alignItems:"center",gap:10,padding:"12px 28px",borderRadius:50,border:"1.5px solid "+C.border,background:"#fff",cursor:"pointer",fontSize:15,fontWeight:700,color:C.text,boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>
              <img src="https://www.google.com/favicon.ico" width="18" height="18" alt="G"/>
              {gLoading?"Signing in…":"Sign in with Google"}
            </button>
          </div>
        )}

        <Card style={{marginBottom:16}} ch={<>
          <p style={{fontWeight:800,fontSize:15,marginBottom:16}}>Your Profile</p>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:18}}>
            {user?.picture?<img src={user.picture} alt="" style={{width:56,height:56,borderRadius:"50%",objectFit:"cover"}}/>
              :<div style={{width:56,height:56,borderRadius:"50%",background:grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:800}}>{user?.name?.[0]||"G"}</div>}
            <div>
              <p style={{fontWeight:800,fontSize:16}}>{user?.isGuest?"Guest User":user?.name}</p>
              <p style={{fontSize:13,color:C.gray}}>{user?.isGuest?"Not signed in":user?.email||""}</p>
              {user?.isGuest?<span style={{fontSize:11,background:"#fff3e0",color:C.o,padding:"2px 8px",borderRadius:20,fontWeight:700}}>Guest</span>
                :<span style={{fontSize:11,background:"#ecfdf5",color:"#10b981",padding:"2px 8px",borderRadius:20,fontWeight:700}}>✓ Google Account</span>}
            </div>
          </div>
          {!user?.isGuest&&<>
            <div style={{marginBottom:12}}><p style={{fontSize:12,fontWeight:700,color:C.gray,marginBottom:6}}>DISPLAY NAME</p><Inp val={name} onChange={e=>setName(e.target.value)}/></div>
            {saved&&<div style={{background:"#ecfdf5",border:"1px solid #a7f3d0",borderRadius:10,padding:10,fontSize:13,fontWeight:600,color:"#065f46",marginBottom:12}}>✅ Saved!</div>}
            <Btn ch="Save Changes" onClick={save}/>
          </>}
        </>}/>

        <Card style={{marginBottom:16}} ch={<>
          <p style={{fontWeight:800,fontSize:15,marginBottom:14}}>💳 Subscription</p>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><p style={{fontWeight:700}}>Free Plan</p><p style={{fontSize:13,color:C.gray}}>3 people · Basic features</p></div>
            <Btn ch="Upgrade — ₹299/mo"/>
          </div>
        </>}/>

        {user?.isGuest
          ?<Btn ch="🔵 Sign in with Google" onClick={onGoogle} disabled={gLoading}/>
          :<Btn ch="Sign Out" type="g" style={{color:"#ef4444",borderColor:"#fecaca"}} onClick={onLogout}/>
        }
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(()=>ls.get("echo_user",null));
  const [people,setPeople]=useState(()=>ls.get("echo_people",SEED));
  const [page,setPage]=useState("dash");
  const [ap,setAP]=useState(null);
  const [ao,setAO]=useState(null);
  const [mf,setMF]=useState("All");
  const [gLoading,setGLoading]=useState(false);

  // Auto guest — no login needed
  useEffect(()=>{
    if(!user){
      const g={name:"Guest",isGuest:true};
      setUser(g);ls.set("echo_user",g);
    }
  },[]);

  // Google login (simulated — replace with real OAuth on deploy)
  const handleGoogle=async()=>{
    setGLoading(true);
    await new Promise(r=>setTimeout(r,1100));
    const u={name:"Riya Sharma",email:"riya@gmail.com",picture:null,isGuest:false,isGoogle:true};
    setUser(u);ls.set("echo_user",u);
    setGLoading(false);
  };

  const nav=(p)=>{setPage(p);window.scrollTo(0,0);};

  const onUpdate=(updated)=>{
    const nx=people.map(p=>p.id===updated.id?updated:p);
    setPeople(nx);ls.set("echo_people",nx);
    if(ap?.id===updated.id)setAP(updated);
  };

  const titles={dash:"🏠 Dashboard",people:"👥 Your People",sugg:"🎁 Gift Suggestions",quiz:"🎯 This or That Quiz",market:"🛍️ Marketplace",occ:"📅 Occasions",tl:"📋 Gift Timeline",ins:"💡 Insights",set:"⚙️ Settings"};

  if(!user)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#fff9f6"}}><p style={{fontSize:16,color:"#9ca3af"}}>Opening EchoGifts… 🎁</p></div>;

  return(
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#f8f7f5",color:C.text}}>
      <Sidebar page={page} setPage={nav} user={user} onGoogle={handleGoogle} gLoading={gLoading}/>
      <div style={{marginLeft:250,flex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}}>

        {/* Guest banner */}
        {user?.isGuest&&<AuthBanner onGoogle={handleGoogle} loading={gLoading}/>}

        {/* Topbar */}
        <div style={{background:"#fff",borderBottom:"1px solid "+C.border,padding:"0 28px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:40}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800,color:C.dark,margin:0}}>{titles[page]}</h2>
            <p style={{fontSize:12,color:"#9ca3af",margin:0}}>{user?.isGuest?"👋 Using as guest":`नमस्ते, ${user.name?.split(" ")[0]}! 👋`}</p>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Btn ch="🎯 New Quiz" type="g" sm onClick={()=>nav("quiz")}/>
            <Btn ch="+ Add Person" sm onClick={()=>nav("people")}/>
            {user?.isGuest?(
              <button onClick={handleGoogle} disabled={gLoading}
                style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",borderRadius:50,border:"1.5px solid "+C.border,background:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,color:C.text,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
                <img src="https://www.google.com/favicon.ico" width="14" height="14" alt="G"/>
                {gLoading?"…":"Sign in"}
              </button>
            ):(
              <div onClick={()=>nav("set")} style={{width:36,height:36,borderRadius:"50%",background:grad,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                {user.name?.[0]||"U"}
              </div>
            )}
          </div>
        </div>

        {/* Pages */}
        {page==="dash"  &&<Dash    people={people} setPage={nav} setAP={setAP} setAO={setAO} user={user}/>}
        {page==="people"&&<People  people={people} setPeople={setPeople} setPage={nav} setAP={setAP} setAO={setAO}/>}
        {page==="sugg"  &&<Sugg    person={ap} occ={ao} setPage={nav} setMF={setMF}/>}
        {page==="quiz"  &&<Quiz    people={people} setPeople={setPeople} setPage={nav} setAP={setAP} setAO={setAO}/>}
        {page==="market"&&<Market  initFilter={mf}/>}
        {page==="occ"   &&<Occ     people={people} setPage={nav} setAP={setAP} setAO={setAO}/>}
        {page==="tl"    &&<Timeline people={people} onUpdate={onUpdate} activePerson={ap}/>}
        {page==="ins"   &&<Insights people={people}/>}
        {page==="set"   &&<Settings user={user} setUser={setUser} onGoogle={handleGoogle} gLoading={gLoading} onLogout={()=>{ls.set("echo_user",null);setUser(null);window.location.reload();}}/>}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
